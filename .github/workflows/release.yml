name: Build and Release BreakInv

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:

  # ─────────────────────────────────────────────
  # Windows — MSI installer (requires WiX 3.x)
  # WiX 3.11 is pre-installed on windows-latest
  # ─────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Setup Java 21
        uses: actions/setup-java@v4.7.0
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build fat JAR
        run: mvn clean package

      - name: Copy JavaFX Windows modules to fx-mods
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path fx-mods | Out-Null
          $mods = @("javafx-controls", "javafx-graphics", "javafx-base", "javafx-fxml")
          foreach ($m in $mods) {
              Copy-Item "$env:USERPROFILE\.m2\repository\org\openjfx\$m\21.0.10\$m-21.0.10-win.jar" fx-mods\
          }

      - name: Create runtime image with jlink
        shell: pwsh
        run: >
          jlink
          --module-path "$env:JAVA_HOME/jmods;fx-mods"
          --add-modules java.base,java.sql,java.logging,java.desktop,java.xml,java.naming,jdk.unsupported,jdk.crypto.ec,javafx.controls,javafx.graphics,javafx.base,javafx.fxml
          --output jlink-runtime
          --no-header-files
          --no-man-pages
          --strip-debug
          --compress=2

      - name: Package with jpackage (MSI)
        shell: pwsh
        run: >
          jpackage
          --input target/
          --main-jar breakinv-0.5.0.jar
          --main-class com.daniel.main.App
          --name BreakInv
          --app-version 0.5.0
          --dest output/
          --type msi
          --runtime-image jlink-runtime
          --java-options '-Dfile.encoding=UTF-8'
          --win-menu
          --win-shortcut
          --win-menu-group BreakInv

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: BreakInv-windows
          path: output/

  # ─────────────────────────────────────────────
  # Linux — DEB package (requires fakeroot/dpkg)
  # ─────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Setup Java 21
        uses: actions/setup-java@v4.7.0
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install DEB packaging tools
        run: sudo apt-get install -y fakeroot binutils

      - name: Build fat JAR
        run: mvn clean package

      - name: Copy JavaFX Linux modules to fx-mods
        run: |
          mkdir -p fx-mods
          find $HOME/.m2/repository/org/openjfx -name "*-21.0.10-linux.jar" -exec cp {} fx-mods/ \;

      - name: Create runtime image with jlink
        run: >
          jlink
          --module-path "$JAVA_HOME/jmods:fx-mods"
          --add-modules java.base,java.sql,java.logging,java.desktop,java.xml,java.naming,jdk.unsupported,jdk.crypto.ec,javafx.controls,javafx.graphics,javafx.base,javafx.fxml
          --output jlink-runtime
          --no-header-files
          --no-man-pages
          --strip-debug
          --compress=2

      - name: Package with jpackage (DEB)
        run: >
          jpackage
          --input target/
          --main-jar breakinv-0.5.0.jar
          --main-class com.daniel.main.App
          --name BreakInv
          --app-version 0.5.0
          --dest output/
          --type deb
          --runtime-image jlink-runtime
          --java-options '-Dfile.encoding=UTF-8'

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: BreakInv-linux
          path: output/

  # ─────────────────────────────────────────────
  # Publish GitHub Release with Windows and Linux installers
  # ─────────────────────────────────────────────
  publish-release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4.2.1
        with:
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: BreakInv ${{ github.ref_name }}
          files: artifacts/**/*
